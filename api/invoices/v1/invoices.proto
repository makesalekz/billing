syntax = "proto3";

package invoices.v1;

import "api/utils/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/finance/invoices/api/invoices/v1;invoices_v1";
option java_multiple_files = true;
option java_package = "invoices.v1";

service Invoices {
  rpc GenerateInvoice(GenerateInvoiceRequest) returns (GenerateInvoiceResponse);
}

message GenerateInvoiceRequest {
  int64 productId = 1;
}

message GenerateInvoiceResponse {
  int64 invoiceId = 1;
}
syntax = "proto3";

package dummy.v1;

import "google/api/annotations.proto";
import "api/dummy/v1/utils.proto";

option go_package = "gitlab.calendaria.team/services/dummy/api/dummy/v1;dummy_v1";
option java_multiple_files = true;
option java_package = "dummy.v1";

service Dummy {
	rpc CreateDummy (EmptyRequest) returns (EmptyReply) {
		option (google.api.http) = {
			post: "/v1/dummy"
			body: "*"
		};
	};
}

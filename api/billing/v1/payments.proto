syntax = "proto3";

package billing.v1;

import "api/utils/v1/models.proto";

option go_package = "gitlab.calendaria.team/services/finance/billing/api/billing/v1;billing_v1";
option java_multiple_files = true;
option java_package = "billing.v1";

service Payments {
  rpc CreatePayment(CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc Complete3DS(Complete3DSRequest) returns (Complete3DSResponse);
  rpc GetPaymentStatus(GetPaymentStatusRequest) returns (GetPaymentStatusResponse);
  rpc CancelSubscription(CancelSubscriptionRequest) returns (utils.v1.EmptyReply);
  rpc CheckWebhook(WebhookPayload) returns (WebhookResponse);
  rpc PaymentWebhook(WebhookPayload) returns (WebhookResponse);
  rpc RecurrentWebhook(WebhookPayload) returns (WebhookResponse);
  // Legacy OVP callback — kept for backward compatibility
  rpc PaymentCallback(PaymentCallbackRequest) returns (utils.v1.EmptyReply);
}

message GetPaymentStatusRequest {
  int64 transactionId = 1;
}

message GetPaymentStatusResponse {
  bool found = 1;
  string status = 2;
  int64 invoiceId = 3;
  int64 productId = 4;
  string productName = 5;
  string price = 6;
  string currency = 7;
  string paidAt = 8;
  string paidTill = 9;
}

message CreatePaymentRequest {
  int64 productId = 1;
  optional int64 amount = 2;
  string cardCryptogramPacket = 3;
  string ipAddress = 4;
  optional string name = 5;
  optional string email = 6;
}

message CreatePaymentResponse {
  int64 invoiceId = 1;
  bool success = 2;
  // 3DS fields (populated when 3DS is required)
  optional int64 transactionId = 3;
  optional string paReq = 4;
  optional string acsUrl = 5;
  // Card token (populated on immediate success)
  optional string token = 6;
}

message Complete3DSRequest {
  int64 transactionId = 1;
  string paRes = 2;
}

message Complete3DSResponse {
  bool success = 1;
  optional string token = 2;
  optional int64 invoiceId = 3;
}

message CancelSubscriptionRequest {
  int64 userId = 1;
  int64 subscriptionId = 2;
}

message RequestRefundRequest {
  int64 invoiceId = 1;
  int64 amount = 2;
  string reason = 3;
}

message RequestRefundResponse {
  string paymentUrl = 1;
}

message PayerInfo {
  string panMasked = 1;
  string holder = 2;
  string email = 3;
  string phone = 4;
  string userToken = 5;
}

// TipTopPay webhook — parsed data from BFF (HMAC verified on BFF side)
message WebhookPayload {
  int64 transactionId = 1;
  double amount = 2;
  string currency = 3;
  string status = 4;
  string invoiceId = 5;
  string accountId = 6;
  string token = 7;
  string subscriptionId = 8;
  int32 reasonCode = 9;
  string cardFirstSix = 10;
  string cardLastFour = 11;
  string cardExpDate = 12;
  string cardType = 13;
  string name = 14;
  string email = 15;
  string dateTime = 16;
  string operationType = 17;
}

message WebhookResponse {
  int32 code = 1;
  string message = 2;
}

// Legacy OVP callback
message PaymentCallbackRequest {
  string data = 1;
  string sign = 2;
}
